name: promote-v1
#
# CONTEXT:
# v1 is the release channel users pin to as terrateamio/action@v1. It is a MOVING
# TAG (not a branch): on every push to main we re-point it at the new commit,
# giving continuous delivery.
#
# Why a tag and not a branch: tags are not subject to branch protection, so the
# default GITHUB_TOKEN can move v1 directly -- no bypass PAT or protection changes.
#
# This also rebuilds and pushes the ghcr.io/terrateamio/action:v1 image (formerly
# done by ci.yaml on push to the v1 branch).
#
on:
  push:
    branches:
      - main
permissions:
  contents: write
  packages: write
jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Move v1 tag to main
        run: |
          set -euo pipefail
          git tag -f v1 "${GITHUB_SHA}"
          git push --force origin refs/tags/v1
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      -
        name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Build and push action
        uses: docker/build-push-action@v3
        with:
          push: true
          file: Dockerfile
          tags: ghcr.io/terrateamio/action:v1
          platforms: linux/amd64,linux/arm64
