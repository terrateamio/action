name: promote-base-bullseye
#
# CONTEXT:
# Customers pinned to older action repo SHAs pull ghcr.io/terrateamio/action-base:latest
# at build time. Updating :latest affects them immediately, so changes must be
# coordinated. See base-bullseye.yaml for full background.
#
# USAGE:
# 1. Run the build-base-bullseye workflow to create a staging tag
#    (e.g. bullseye-1710000000)
# 2. Validate the staging image with the customer
# 3. Run this workflow with the staging tag to promote it to :latest
#
# This workflow re-tags the multi-arch image without rebuilding it.
#
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Staging tag to promote (e.g. bullseye-1234567890)'
        required: true
        type: string
jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      -
        name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Retag as latest
        run: |
          SOURCE="ghcr.io/terrateamio/action-base:${{ inputs.tag }}"
          TARGET="ghcr.io/terrateamio/action-base:latest"
          docker buildx imagetools create --tag "${TARGET}" "${SOURCE}"
      -
        name: Confirm
        run: echo "Promoted ${{ inputs.tag }} to latest"
